name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      ref:
        description: "Tag or commit to build (e.g. v0.2.0)"
        required: true
        default: ""

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            artifact: ai-usagebar-linux-x86_64
            builder: cargo
          - target: aarch64-unknown-linux-gnu
            artifact: ai-usagebar-linux-aarch64
            builder: cross

    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref || github.ref }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install nasm (x86_64 native build; ring assembles its primitives)
        if: matrix.builder == 'cargo'
        run: sudo apt-get update && sudo apt-get install -y nasm

      - name: Install cross (aarch64 cross-compile via Docker)
        if: matrix.builder == 'cross'
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Test (native only — aarch64 binaries can't run on x86 runner)
        if: matrix.builder == 'cargo'
        run: cargo test --release --target ${{ matrix.target }}

      - name: Build release binaries
        run: ${{ matrix.builder }} build --release --target ${{ matrix.target }} --locked

      - name: Create tarball (both bins + LICENSE + config example)
        run: |
          STAGE=$(mktemp -d)
          cp target/${{ matrix.target }}/release/ai-usagebar \
             target/${{ matrix.target }}/release/ai-usagebar-tui \
             "$STAGE/"
          cp LICENSE README.md config.example.toml "$STAGE/"
          tar czf ${{ matrix.artifact }}.tar.gz -C "$STAGE" .
          rm -rf "$STAGE"

      - name: Compute SHA256
        run: |
          SHA=$(sha256sum ${{ matrix.artifact }}.tar.gz | awk '{print $1}')
          echo "$SHA  ${{ matrix.artifact }}.tar.gz" > ${{ matrix.artifact }}.tar.gz.sha256
          echo "Built ${{ matrix.artifact }}.tar.gz sha256=$SHA"

      - uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}.tar.gz
            ${{ matrix.artifact }}.tar.gz.sha256

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source (for CHANGELOG + previous tag)
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref || github.ref }}
          fetch-depth: 0

      - uses: actions/download-artifact@v5
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate release body
        env:
          TAG: ${{ inputs.ref || github.ref_name }}
        run: |
          VERSION="${TAG#v}"
          # `-Fxv "$TAG"`: -F treats TAG as a fixed string (dots aren't regex
          # wildcards), -x requires whole-line match. Robust against the dots
          # in version strings like `v0.4.1`.
          PREV_TAG=$(git tag --sort=-v:refname | grep -Fxv "$TAG" | head -1)

          # Extract matching section from CHANGELOG.md (between "## [VERSION]"
          # and the next "## [" header). Empty file if no match.
          # `index(s, t) == 1` is a string prefix-equality match — no regex,
          # so dots in `ver` (e.g. `0.4.1`) stay literal.
          awk -v ver="$VERSION" '
            BEGIN { hdr = "## [" ver "]" }
            index($0, hdr) == 1 { flag=1; next }
            flag && index($0, "## [") == 1 { exit }
            flag { print }
          ' CHANGELOG.md > changelog_section.md

          {
            if [ -s changelog_section.md ]; then
              echo "## What's changed"
              echo
              cat changelog_section.md
            fi

            echo "## Install"
            echo
            echo "### Arch (AUR)"
            echo
            echo '```bash'
            echo "yay -S ai-usagebar-bin      # prebuilt binary from this release"
            echo "yay -S ai-usagebar          # compiles from source"
            echo '```'
            echo
            echo "### Manual"
            echo
            echo '```bash'
            echo "curl -fsSL https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/ai-usagebar-linux-x86_64.tar.gz | tar xz -C ~/.local/bin ai-usagebar ai-usagebar-tui"
            echo '```'
            echo
            echo "## Checksums (SHA256)"
            echo '```'
            cat artifacts/*.sha256
            echo '```'

            if [ -n "$PREV_TAG" ]; then
              echo
              echo "**Full diff**: https://github.com/${GITHUB_REPOSITORY}/compare/${PREV_TAG}...${TAG}"
            fi
          } > body.md

      - name: Create / update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ inputs.ref || github.ref_name }}"
          # Replace any pre-existing assets so re-runs (workflow_dispatch on
          # an existing tag) overwrite cleanly.
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$TAG" artifacts/*.tar.gz artifacts/*.sha256 \
              --repo "$GITHUB_REPOSITORY" --clobber
            gh release edit "$TAG" --repo "$GITHUB_REPOSITORY" --notes-file body.md
          else
            gh release create "$TAG" artifacts/*.tar.gz artifacts/*.sha256 \
              --repo "$GITHUB_REPOSITORY" \
              --title "$TAG" \
              --notes-file body.md \
              --latest
          fi

  publish-crates-io:
    needs: [build, release]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || inputs.ref != ''
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref || github.ref }}
      - uses: dtolnay/rust-toolchain@stable

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          if [ -z "$CARGO_REGISTRY_TOKEN" ]; then
            echo "::warning::Skipping crates.io publish — no CARGO_REGISTRY_TOKEN secret set"
            exit 0
          fi
          log="${RUNNER_TEMP:-/tmp}/cargo-publish.log"
          set +e
          cargo publish 2>&1 | tee "$log"
          status=${PIPESTATUS[0]}
          set -e
          if [ "$status" -eq 0 ]; then
            exit 0
          fi
          # Idempotent re-runs: if the version is already on crates.io
          # (e.g. workflow_dispatch fired against an old tag), skip
          # quietly instead of failing the workflow.
          if grep -q "crate ai-usagebar@.* already exists on crates.io index" "$log"; then
            echo "::warning::Skipping crates.io publish — ${GITHUB_REF_NAME#v} already exists"
            exit 0
          fi
          exit "$status"
