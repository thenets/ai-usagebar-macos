name: CI

# macOS-only project: build + test the Rust usage engine and compile the native
# SwiftUI menu bar app on a real macOS runner.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  macos:
    name: build & test (macos-latest)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Test engine
        run: cargo test --all-targets --locked

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Build menu bar app
        run: ./macos/build.sh
